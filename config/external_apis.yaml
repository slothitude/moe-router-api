# External AI API Configuration for Pi Agent Boss
# This config allows Pi Agent to connect to external model APIs for benchmarking
# and testing the internal MOE router system.

external_apis:
  # NVIDIA NIM API - Llama 3.1 405B for comparison benchmarking
  nvidia_nim:
    enabled: true
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key_env: "NVIDIA_API_KEY"
    models:
      - name: "meta/llama-3.1-405b-instruct"
        display_name: "Llama 3.1 405B (NVIDIA)"
        categories: ["factual", "document"]
        specialization: "large-knowledge-model"
        priority: 90  # Higher priority for complex factual queries

